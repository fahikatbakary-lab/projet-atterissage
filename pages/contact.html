<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - BKYSHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">BKYSHOP</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="../index.html">Accueil</a>
          <a class="nav-link" href="../pages/valises.html">Valises</a>
          <a class="nav-link" href="../pages/sacs.html">Sacs</a>
          <a class="nav-link" href="../pages/sechoirs.html">Séchoirs</a>
          <a class="nav-link" href="../pages/ventilateurs.html">Ventilateurs</a>
          <a class="nav-link active" href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="section-shell">
    <div class="container">
      <div class="row g-4 align-items-stretch">
        <div class="col-lg-5">
          <div class="contact-card h-100">
            <h2 class="section-title">Contactez-nous</h2>
            <p>Pour toute demande sur nos produits, nos prix, la disponibilité ou la livraison.</p>
            <ul class="list-unstyled">
              <li class="mb-3"><i class="bi bi-geo-alt-fill text-primary me-2"></i>Abidjan, Côte d’Ivoire</li>
              <li class="mb-3"><i class="bi bi-telephone-fill text-primary me-2"></i>+225 0544950997</li>
              <li class="mb-3"><i class="bi bi-envelope-fill text-primary me-2"></i>bkyshop@gmail.com</li>
              <li class="mb-3"><i class="bi bi-whatsapp text-primary me-2"></i>WhatsApp</li>
              <li class="mb-3"><i class="bi bi-facebook text-primary me-2"></i>Facebook</li>
              <li class="mb-3"><i class="bi bi-instagram text-primary me-2"></i>Instagram</li>
              <li class="mb-3"><i class="bi bi-tiktok text-primary me-2"></i>TikTok</li>
            </ul>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="contact-card">
            <form data-validate-form>
              <div class="row g-3">
                <div class="col-md-6"><input class="form-control" type="text" placeholder="Nom complet" required /></div>
                <div class="col-md-6"><input class="form-control" type="email" placeholder="Email" required /></div>
                <div class="col-md-6"><input class="form-control" type="text" placeholder="Téléphone" required /></div>
                <div class="col-md-6"><input class="form-control" type="text" placeholder="Objet" required /></div>
                <div class="col-12"><textarea class="form-control" rows="5" placeholder="Votre message" required></textarea></div>
                <div class="col-12"><button class="btn btn-primary-custom" type="submit">Envoyer</button></div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="toast-wrapper" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
