<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commandes - BKYSHOP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">BKYSHOP</a>
    </div>
  </nav>

  <section class="section-shell">
    <div class="container">
      <h1 class="section-title">Commandes clients</h1>
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Client</th>
              <th>Téléphone</th>
              <th>Ville</th>
              <th>Produit</th>
              <th>Quantité</th>
              <th>Commentaire</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="../js/main.js"></script>
  <script>
    const STORAGE_KEY = 'bkyshop_orders';
    const tbody = document.querySelector('#ordersTableBody');

    function getSavedOrders() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const orders = raw ? JSON.parse(raw) : [];
        return Array.isArray(orders) ? orders : [];
      } catch (error) {
        return [];
      }
    }

    function renderOrders() {
      const orders = getSavedOrders();

      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">Aucune commande enregistrée pour le moment.</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map((order) => `
        <tr>
          <td>${order.id || '-'}</td>
          <td>${order.date || '-'}</td>
          <td>${order.Nom || order.nom || '-'}</td>
          <td>${order.Téléphone || order.telephone || '-'}</td>
          <td>${order.Ville || order.ville || '-'}</td>
          <td>${order.produit || '-'}</td>
          <td>${order.quantite || '-'}</td>
          <td>${order.commentaire || order.Commentaire || '-'}</td>
        </tr>
      `).join('');
    }

    renderOrders();
  </script>
</body>
</html>
